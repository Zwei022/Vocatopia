name: iOS Build & Upload to App Store Connect

# 手動觸發（不會自動在每次 push 時執行——上傳到 App Store Connect 是有實際後果的
# 動作，不該無意間自動跑）。跑完會把新的 build 上傳到 App Store Connect，
# 之後要到網頁上手動把這個 build 選進版本裡、送審。
on:
  workflow_dispatch: {}

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 列出這台 runner 上所有已安裝的 Xcode 版本（除錯用）
        run: ls /Applications | grep Xcode

      - name: 選用最新版 Xcode（Apple 現在要求上傳 App Store 至少要 iOS 26 SDK）
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm ci

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: 匯入簽章憑證到暫時 keychain
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -e
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          # macOS 內建是 BSD base64（解碼旗標是 -D，不是 GNU 版的 --decode），
          # 用 -i/-o 明確指定輸入輸出檔案，避免透過 pipe/echo 可能吃到多餘換行或被誤判成空輸入。
          printf '%s' "$IOS_DIST_CERT_P12_BASE64" > "$RUNNER_TEMP/cert.p12.b64"
          base64 -D -i "$RUNNER_TEMP/cert.p12.b64" -o "$RUNNER_TEMP/cert.p12"
          ls -l "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$IOS_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

      - name: 安裝 Provisioning Profile
        env:
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -e
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          printf '%s' "$IOS_PROVISION_PROFILE_BASE64" > "$RUNNER_TEMP/profile.b64"
          base64 -D -i "$RUNNER_TEMP/profile.b64" -o "$PROFILE_DIR/vocatopia_appstore.mobileprovision"
          ls -l "$PROFILE_DIR/vocatopia_appstore.mobileprovision"

      - name: Archive（build number 用 run number 確保遞增）
        # 簽章設定（CODE_SIGN_STYLE=Manual、Provisioning Profile、Team）已經直接寫在
        # App target 的 Release 設定裡（project.pbxproj），不透過命令列全域覆寫——
        # 命令列覆寫會連 SPM 套件（例如 RevenueCat 函式庫 target）都一起套用，
        # 但函式庫 target 本來就不支援/不需要 provisioning profile，會導致 Archive 失敗。
        run: |
          set -e
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: 產生 exportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>NJ7M3XM9WQ</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.vocatopia.app</key>
              <string>RevenueCat</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export .ipa
        run: |
          set -e
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

      - name: 上傳到 App Store Connect
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -e
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_API_KEY_BASE64" > "$RUNNER_TEMP/apikey.b64"
          base64 -D -i "$RUNNER_TEMP/apikey.b64" -o "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          ls -l "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          echo "上傳檔案：$IPA_PATH"

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: 上傳 .ipa 當 artifact（備份用，方便除錯）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vocatopia-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 14
